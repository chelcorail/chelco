<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHELCO | Rail & Infrastructure</title>
    <style>
        :root { --navy: #1a2b48; --orange: #f39c12; --light: #f9f9f9; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; color: #333; line-height: 1.6; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: #fff; border-bottom: 3px solid var(--navy); sticky: top; }
        .logo img { height: 70px; }
        .lang-switch button { background: var(--navy); color: white; border: none; padding: 8px 15px; cursor: pointer; font-weight: bold; margin-left: 5px; border-radius: 4px; }
        
        .hero { background: var(--light); padding: 50px 5%; text-align: center; border-bottom: 1px solid #ddd; }
        .hero h1 { color: var(--navy); margin-bottom: 10px; font-size: 2.2rem; }
        .phases-bar { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 20px; }
        .phase-badge { background: #e0e0e0; padding: 5px 15px; border-radius: 20px; font-size: 0.9rem; font-weight: bold; color: var(--navy); border: 1px solid #ccc; }

        .services-section { padding: 50px 5%; max-width: 1000px; margin: 0 auto; }
        .service-category { margin-bottom: 30px; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; }
        .category-header { background: var(--navy); color: white; padding: 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .category-header:hover { background: #243b61; }
        .category-content { padding: 20px; display: none; background: white; }
        .category-content ul { list-style: none; padding: 0; }
        .category-content li { padding: 10px 0; border-bottom: 1px solid #eee; display: flex; align-items: center; }
        .category-content li::before { content: "•"; color: var(--orange); font-weight: bold; width: 20px; display: inline-block; }
        
        footer { text-align: center; padding: 30px; background: var(--navy); color: white; font-size: 0.9rem; }
        .show { display: block !important; }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <img src="logo.png" alt="CHELCO Rail & Infrastructure">
    </div>
    <div class="lang-switch">
        <button onclick="changeLang('tr')">TR</button>
        <button onclick="changeLang('en')">EN</button>
    </div>
</header>

<section class="hero">
    <h1 id="main-title">Demiryolu ve Altyapı Tasarım Hizmetleri</h1>
    <div class="phases-bar" id="phases-list">
        </div>
</section>

<main class="services-section">
    <div class="service-category">
        <div class="category-header" onclick="toggleCategory('cat1')">
            <span id="cat1-title">Tasarım Yönetimi</span>
            <span>▼</span>
        </div>
        <div id="cat1" class="category-content">
            <ul id="cat1-list"></ul>
        </div>
    </div>

    <div class="service-category">
        <div class="category-header" onclick="toggleCategory('cat2')">
            <span id="cat2-title">Mühendislik</span>
            <span>▼</span>
        </div>
        <div id="cat2" class="category-content">
            <ul id="cat2-list"></ul>
        </div>
    </div>
</main>

<footer>
    <p>&copy; 2026 CHELCO Rail & Infrastructure</p>
</footer>

<script>
    const content = {
        tr: {
            title: "Demiryolu ve Altyapı Tasarım Hizmetleri",
            phases: ["İhale Tasarımı", "Uygulamaya Esas Kesin Proje Tasarımı", "Uygulama Tasarımı", "As-Built Tasarım"],
            cat1Title: "Tasarım Yönetimi",
            cat1Items: ["Arayüz Yönetimi", "Şartname ve Gereklilikler Yönetimi", "Kapsam Yönetimi", "Maliyet ve Zaman Yönetimi", "Kalite Yönetimi", "Dokümantasyon Yönetimi"],
            cat2Title: "Mühendislik",
            cat2Items: ["Hat Üst Yapısı Tasarımı", "Hat Güzergah Tasarımı", "Drenaj Tasarımı"]
        },
        en: {
            title: "Rail and Infrastructure Engineering Services",
            phases: ["Tender Design", "RFP Design", "Basic Design", "Detailed Design", "As-Built Design"],
            cat1Title: "Design Management",
            cat1Items: ["Interface Management", "Requirements Management", "Scope Management", "Cost and Time Management", "Quality Management", "Documentation Management"],
            cat2Title: "Engineering",
            cat2Items: ["Trackwork Design", "Alignment Design", "Drainage Design"]
        }
    };

    function changeLang(lang) {
        document.getElementById('main-title').innerText = content[lang].title;
        document.getElementById('cat1-title').innerText = content[lang].cat1Title;
        document.getElementById('cat2-title').innerText = content[lang].cat2Title;

        // Tasarım Aşamalarını Güncelle
        const phasesDiv = document.getElementById('phases-list');
        phasesDiv.innerHTML = content[lang].phases.map(p => `<span class="phase-badge">${p}</span>`).join('');

        // Tasarım Yönetimi Listesini Güncelle
        const cat1Div = document.getElementById('cat1-list');
        cat1Div.innerHTML = content[lang].cat1Items.map(i => `<li>${i}</li>`).join('');

        // Mühendislik Listesini Güncelle
        const cat2Div = document.getElementById('cat2-list');
        cat2Div.innerHTML = content[lang].cat2Items.map(i => `<li>${i}</li>`).join('');
    }

    function toggleCategory(id) {
        const contentDiv = document.getElementById(id);
        contentDiv.classList.toggle('show');
    }

    // İlk açılışta Türkçe yükle
    changeLang('tr');
</script>

</body>
</html>
