<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHELCO | Rail & Infrastructure Engineering Services</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #1a2b48;
            --orange: #f39c12;
            --white: #ffffff;
            --light-bg: #f4f7f9;
            --text: #2c3e50;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Roboto', sans-serif; color: var(--text); background-color: var(--white); overflow-x: hidden; }

        /* Header & Language Switch */
        header {
            position: absolute;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: flex-end;
            padding: 20px 5%;
            z-index: 100;
        }

        .lang-switch button {
            background: rgba(26, 43, 72, 0.05);
            border: 1px solid var(--navy);
            color: var(--navy);
            padding: 6px 15px;
            cursor: pointer;
            font-weight: 600;
            margin-left: 10px;
            border-radius: 2px;
            transition: 0.3s;
            font-family: 'Montserrat', sans-serif;
        }

        .lang-switch button:hover {
            background: var(--navy);
            color: white;
        }

        /* Hero Section - Logo and Title Centered */
        .hero {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(to bottom, #ffffff 0%, #f8f9fa 100%);
            padding: 0 5%;
        }

        .hero img {
            max-width: 450px; /* Logoyu büyüttük */
            height: auto;
            margin-bottom: 25px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05));
        }

        .hero h1 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            font-size: 1.8rem;
            letter-spacing: 2px;
            color: var(--navy);
            text-transform: uppercase;
        }

        /* Design Phases - Minimalist Bar */
        .phases-container {
            background: var(--navy);
            padding: 15px 0;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .phase-tag {
            color: #bdc3c7;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .phase-tag.active { color: var(--orange); }

        /* Services Grid */
        .services-wrapper {
            max-width: 1100px;
            margin: 80px auto;
            padding: 0 5%;
        }

        .section-title {
            text-align: center;
            font-family: 'Montserrat', sans-serif;
            font-size: 2rem;
            margin-bottom: 50px;
            position: relative;
            padding-bottom: 15px;
        }
